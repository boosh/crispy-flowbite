<h3 id="{{ div.css_id }}-accordion-heading" class="block mb-4">
  <button type="button"
          class="w-full pb-3 font-medium rtl:text-right text-gray-500 border-b border-gray-200 dark:border-gray-700 dark:text-gray-400 gap-3"
          data-accordion-target="#{{ div.css_id }}-accordion-body" aria-expanded="{% if div.initially_open %}true{% else %}false{% endif %}"
          aria-controls="{{ div.css_id }}-accordion-body">

    <div class="flex justify-between">
      <div>
        <div class="flex items-center w-full space-x-4">
          <span class="text-base">{{ div.name }}</span>
          <svg data-accordion-icon class="w-3 h-3 rotate-180 shrink-0" aria-hidden="true"
               xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 10 6">
            <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M9 5 5 1 1 5"></path>
          </svg>
        </div>
        {% if div.help_text %}
        <small class="block text-base text-left">{{ div.help_text }}</small>
        {% endif %}
      </div>

      <div class="focus:outline-none text-white bg-yellow-400 hover:bg-yellow-500 focus:ring-4 focus:ring-yellow-300 font-medium rounded-lg text-sm px-5 py-2.5 me-2 mb-2 dark:focus:ring-yellow-900">Yellow</div>
    </div>
  </button>
</h3>
<div id="{{ div.css_id }}-accordion-body" class="hidden pt-2" aria-labelledby="{{ div.css_id }}-accordion-heading">
  {{ fields|safe }}
</div>
